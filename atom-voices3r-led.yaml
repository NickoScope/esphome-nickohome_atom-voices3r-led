      - addressable_lambda:
          name: "TV Simulator"
          update_interval: 90ms
          lambda: |-
            int N = it.size(); float af = id(active_leds).state; int n = (isnan(af) || af < 1.0f) ? N : (int) af; if (n > N) n = N;
            static int hold = 0;
            static float cr = 120, cg = 140, cb = 200;
            static float tr = 120, tg = 140, tb = 200;
            static float sbr = 0.6f;
            if (hold <= 0) {
              hold = 5 + (int)(random_uint32() % 30);
              uint32_t r = random_uint32();
              uint8_t mode = (uint8_t)((r >> 4) % 10);
              if (mode < 6) {
                tb = 200 + random_uint32() % 56; tr = 90 + random_uint32() % 90; tg = 120 + random_uint32() % 80;
              } else if (mode < 9) {
                float w = 225 + random_uint32() % 31; tr = w; tg = w; tb = w;
              } else {
                tr = 200 + random_uint32() % 56; tg = 110 + random_uint32() % 70; tb = 40 + random_uint32() % 70;
              }
              sbr = 0.25f + (random_uint32() % 76) / 100.0f;
            }
            hold--;
            float k = 0.18f;
            cr += (tr - cr) * k; cg += (tg - cg) * k; cb += (tb - cb) * k;
            float fl = sbr * (0.85f + (random_uint32() % 31) / 100.0f);
            if (fl > 1.0f) fl = 1.0f; if (fl < 0.0f) fl = 0.0f;
            uint8_t R = (uint8_t)(cr * fl), G = (uint8_t)(cg * fl), B = (uint8_t)(cb * fl);
            for (int i = 0; i < n; i++) it[i] = Color(R, G, B);
            for (int i = n; i < N; i++) it[i] = Color(0,0,0);

      # Bell Glow - gentle warm-gold breathing glow, used as the smooth light accompaniment
      # for the Westminster chimes (Home Assistant turns this effect on while the bells play).
      # Time-based (not mic-reactive) because the mic is off during speaker playback.
      - addressable_lambda:
