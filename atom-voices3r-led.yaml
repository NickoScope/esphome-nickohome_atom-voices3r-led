          lambda: |-
            int N = it.size(); float af = id(active_leds).state; int n = (isnan(af) || af < 1.0f) ? N : (int) af; if (n > N) n = N;
            static float ph = 0; ph = fmodf(ph + 0.06f, 6.2831853f);
            for (int i = 0; i < n; i++) {
              float b = 0.35f + 0.65f * (0.5f + 0.5f * sinf(ph + i * 0.12f));
              it[i] = Color((uint8_t)(255*b), (uint8_t)(150*b), (uint8_t)(40*b));
            }
            for (int i = n; i < N; i++) it[i] = Color(0,0,0);

      # ---- Non-audio ambient effects (no microphone needed) ----
      # Fireplace - flickering fire (Fire2012-style heat simulation).
      - addressable_lambda:
          name: "Fireplace"
          update_interval: 60ms
          lambda: |-
            int N = it.size(); float af = id(active_leds).state; int n = (isnan(af) || af < 1.0f) ? N : (int) af; if (n > N) n = N;
            static std::vector<int> heat; if ((int)heat.size() != n) heat.assign(n, 0);
            for (int i = 0; i < n; i++) { int c = random_uint32() % ((100 / (n>0?n:1)) + 3); heat[i] -= c; if (heat[i] < 0) heat[i] = 0; }
            for (int i = n - 1; i >= 2; i--) heat[i] = (heat[i-1] + heat[i-2] + heat[i-2]) / 3;
            if ((random_uint32() % 100) < 65) { int y = random_uint32() % ((n/4)+1); heat[y] += 160 + (random_uint32() % 96); if (heat[y] > 255) heat[y] = 255; }
            for (int i = 0; i < n; i++) {
              int t = heat[i]; if (t > 255) t = 255;
              int t2 = (t * 191) / 255; int ramp = (t2 & 0x3F) << 2;
              uint8_t r, g, b;
              if (t2 > 0x80) { r = 255; g = 255; b = (uint8_t) ramp; }
              else if (t2 > 0x40) { r = 255; g = (uint8_t) ramp; b = 0; }
              else { r = (uint8_t) ramp; g = 0; b = 0; }
              it[i] = Color(r, g, b);
            }
            for (int i = n; i < N; i++) it[i] = Color(0,0,0);

